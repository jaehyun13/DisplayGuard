name: Build installer

# Builds the DisplayGuard installer on Windows.
# - Push a tag like v1.0.0  -> builds and publishes a GitHub Release with the installer attached.
# - Manual run (workflow_dispatch) -> builds and uploads the installer as an artifact only.
#
# This CI build is the integration point for SignPath Foundation free code signing:
# once the SignPath project is connected, it signs the artifact produced by this workflow.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

permissions:
  contents: write   # needed to create the Release

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $v = "${{ github.ref_name }}".TrimStart("v")
          } else {
            $v = "${{ github.event.inputs.version }}"
          }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Building version $v"

      - name: Build installer
        shell: pwsh
        run: .\build.ps1 -Version ${{ steps.ver.outputs.version }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: DisplayGuard-Setup-${{ steps.ver.outputs.version }}
          path: Output/DisplayGuard-Setup-${{ steps.ver.outputs.version }}.exe
          if-no-files-found: error

      - name: Publish GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: Output/DisplayGuard-Setup-${{ steps.ver.outputs.version }}.exe
          generate_release_notes: true
          draft: false
